name: Update Manifest

on:
  push:
    paths:
      - "project-types/**"
      - "toolchains/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install tomli tomli-w tomlkit

      - run: python scripts/generate_manifest.py

      - name: Commit manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate manifest"
          file_pattern: manifest.toml